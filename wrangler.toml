# Cloudflare Pages config for marginalia.
# The site itself is still purely static (served from the repo root); this only
# adds the serverless relay under functions/api/relay/.
name = "marginalia"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# Workers KV namespace for the ephemeral relay mailbox (binding name: RELAY).
# Production binding is configured in the Pages dashboard
# (Settings → Functions → KV namespace bindings), so no [[kv_namespaces]] block
# is needed here — a stale/placeholder id would only break the build.
# Local dev provides the binding via the flag:  wrangler pages dev . --kv RELAY
# See docs/RELAY.md.
