# Cloudflare Pages config for marginalia.
# The site itself is still purely static (served from the repo root); this only
# adds the serverless relay under functions/api/relay/.
name = "marginalia"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# Workers KV namespace for the ephemeral relay mailbox.
# Cloudflare Pages manages bindings from this file (the dashboard UI is disabled
# when wrangler.toml is present), so the production binding lives here.
# Local dev can still override with:  wrangler pages dev . --kv RELAY
# See docs/RELAY.md.
[[kv_namespaces]]
binding = "RELAY"
id = "c95a8b0f8a2f4d4b99ef0efc0092e97e"
